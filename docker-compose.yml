services:
  robomaster-sim:
    build: .
    stdin_open: true
    tty: true
    # Passed through unset-if-unset on purpose: the launch files fail by name
    # on an empty value, which beats defaulting to a backend or IP you didn't
    # choose. SIM picks the backend; ROBOMASTER_IP is only needed when SIM=false.
    environment:
      - SIM=${SIM}
      - ROBOMASTER_IP=${ROBOMASTER_IP}
    volumes:
      - ./ros2_ws:/root/ros2_ws
# apriltag_node config. Based on apriltag_ros's stock tags_36h11.yaml.
#
# 36h11 is the default family and the one to use unless you have a reason:
# best error-correction of the standard families and no collisions with the
# others at typical sizes.
/**:
  ros__parameters:
    image_transport: raw
    family: 36h11
    # MUST match your printed tag's black-border edge in metres. Pose scales
    # linearly with this, so a wrong value gives a confidently wrong distance
    # and the robot stops at the wrong place. Measure the tag, don't trust
    # what the PDF claimed.
    size: 0.16
    max_hamming: 0
    qos_profile: sensor_data  # best-effort, matching the camera's

    detector:
      threads: 2
      decimate: 2.0  # detect on a half-res image. Roughly 4x faster, at the
                     # cost of range. Drop to 1.0 if small/distant tags miss.
      blur: 0.0
      refine: True
      sharpening: 0.25
      debug: False

    pose_estimation_method: "pnp"

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz. No TCP write() in this path, so this is bounded by
                      # the sim step rate, not the robot's link.
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    reference_timeout: 0.5  # kept identical to tether so teleop feels the same
    use_stamped_vel: false  # plain Twist on .../reference_unstamped

    front_left_wheel_command_joint_name: "front_left_wheel_joint"
    front_right_wheel_command_joint_name: "front_right_wheel_joint"
    rear_right_wheel_command_joint_name: "rear_right_wheel_joint"
    rear_left_wheel_command_joint_name: "rear_left_wheel_joint"

    kinematics:
      base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
      wheels_radius: 0.05  # matches wheel.urdf.xacro's collision cylinder radius
      # lx + ly: half-wheelbase (0.1m) + half-track-width (0.1m), from the wheel
      # xyz offsets in base.urdf.xacro (front_left "0.1 0.1 ...", etc).
      sum_of_robot_center_projection_on_X_Y_axis: 0.2

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    enable_odom_tf: true

# Near-identical to tether_controllers.yaml next door — see its trailing note.
